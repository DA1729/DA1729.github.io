<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading… — Daksh Pandey</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <h1><a href="index.html" style="border-bottom: none;">Daksh Pandey</a></h1>
    <nav class="topnav" id="topnav">
        <a href="index.html">&larr; All posts</a> |
        <a href="theorems.html">Theorems</a> |
        <a href="tech.html">Tech Blogs</a> |
        <a href="languages.html">Languages</a> |
        <a href="tags.html">Tags</a>
    </nav>

    <hr>

    <article>
        <header class="post-header">
            <h1 id="post-title">Loading…</h1>
            <p class="post-meta-line" id="post-meta"></p>
            <p class="post-tags-line" id="post-tags"></p>
        </header>

        <div id="theorem-statement-block" class="theorem-statement-block" hidden></div>

        <div class="post-content loading" id="post-content">Loading…</div>
    </article>

    <hr>
    <footer>
        <p id="back-link"><a href="index.html">&larr; Back to all posts</a></p>
        <p><small>&copy; 2026 Daksh Pandey</small></p>
    </footer>

    <script>
        (async () => {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get("post");
            const kindParam = params.get("kind");
            const kind = kindParam === "theorem"  ? "theorem"
                       : kindParam === "tech"     ? "tech"
                       : kindParam === "language" ? "language"
                       :                            "post";
            const content = document.getElementById("post-content");

            if (!slug) {
                content.textContent = "No post specified.";
                return;
            }

            // Basic slug sanity check: allow letters, numbers, dash, underscore.
            if (!/^[A-Za-z0-9_\-]+$/.test(slug)) {
                content.textContent = "Invalid post identifier.";
                return;
            }

            const dirs = { theorem: "theorems", tech: "tech", language: "languages", post: "posts" };
            const manifests = {
                theorem: "theorems.json",
                tech: "tech.json",
                language: "languages.json",
                post: "posts.json"
            };
            const dir = dirs[kind];
            const manifestFile = manifests[kind];

            // Adjust back link for non-default sections.
            if (kind === "theorem") {
                document.getElementById("back-link").innerHTML =
                    '<a href="theorems.html">&larr; Back to theorems</a>';
            } else if (kind === "tech") {
                document.getElementById("back-link").innerHTML =
                    '<a href="tech.html">&larr; Back to tech blogs</a>';
            } else if (kind === "language") {
                document.getElementById("back-link").innerHTML =
                    '<a href="languages.html">&larr; Back to languages</a>';
            }

            // Fetch metadata.
            let meta = null;
            try {
                const res = await fetch(manifestFile);
                const entries = await res.json();
                meta = entries.find(p => p.slug === slug);
            } catch (e) {}

            if (meta) {
                document.title = `${meta.title} — Daksh Pandey`;
                document.getElementById("post-title").textContent = meta.title;
                document.getElementById("post-meta").textContent = formatDate(meta.date);
                document.getElementById("post-tags").innerHTML =
                    (meta.tags || []).map(t => `<span>#${escapeHtml(t)}</span>`).join("");
            }

            // For theorems, show the statement at the top in a styled block.
            if (kind === "theorem" && meta && meta.statement) {
                const block = document.getElementById("theorem-statement-block");
                const attr = meta.attribution ? ` (${escapeHtml(meta.attribution)})` : "";
                const refHtml = meta.reference
                    ? `<p class="theorem-reference">in ${meta.reference}</p>`
                    : "";
                block.innerHTML = `
                    <p><strong>Theorem${attr}.</strong>
                       <span class="theorem-statement">${meta.statement}</span></p>
                    ${refHtml}
                `;
                block.hidden = false;
            }

            // Fetch markdown body.
            const mdRes = await fetch(`${dir}/${slug}.md`);
            if (!mdRes.ok) {
                content.classList.remove("loading");
                content.textContent = kind === "theorem" ? "Theorem not found." : "Post not found.";
                return;
            }

            let md = await mdRes.text();
            md = stripFrontmatter(md);

            // Fall back to first H1 if metadata missing.
            if (!meta) {
                const m = md.match(/^#\s+(.+)$/m);
                if (m) document.getElementById("post-title").textContent = m[1];
            }

            let html = renderMarkdownWithMath(md);

            // For theorems: prepend a "Proof." marker and append a QED tombstone.
            if (kind === "theorem") {
                html = `<p class="proof-opener"><em>Proof.</em></p>` + html +
                       `<p class="qed">&#x220e;</p>`;
            }

            content.innerHTML = html;
            content.classList.remove("loading");

            // Fix up image paths: Hexo used `/images/foo.png`; keep working.
            content.querySelectorAll("img").forEach(img => {
                const src = img.getAttribute("src") || "";
                if (src.startsWith("/images/")) {
                    img.setAttribute("src", src.slice(1));
                }
            });

            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([document.body]);
            }
        })();
    </script>
</body>
</html>
