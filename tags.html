    <h2>Tags</h2>
    <div id="tags"></div>

    <footer>
        <p><small>&copy; 2026 Daksh Pandey</small></p>
    </footer>

    <script>
        (async () => {
            const res = await fetch("posts.json");
            const posts = await res.json();

            const byTag = {};
            for (const p of posts) {
                for (const t of (p.tags || [])) {
                    (byTag[t] ||= []).push(p);
                }
            }

            const tags = Object.keys(byTag).sort((a, b) => a.localeCompare(b));
            const root = document.getElementById("tags");

            for (const t of tags) {
                const group = document.createElement("div");
                group.className = "tag-group";

                const h = document.createElement("h3");
                h.textContent = `#${t}`;
                group.appendChild(h);

                const ul = document.createElement("ul");
                const items = byTag[t].sort((a, b) => b.date.localeCompare(a.date));
                for (const p of items) {
                    const li = document.createElement("li");
                    li.innerHTML = `<a href="post.html?post=${encodeURIComponent(p.slug)}">${escapeHtml(p.title)}</a> <small>— ${formatDate(p.date)}</small>`;
                    ul.appendChild(li);
                }
                group.appendChild(ul);
                root.appendChild(group);
            }
        })();
    </script>
</body>
