    <h2>Posts</h2>
    <ul class="post-list" id="post-list">
        <li><em>Loading...</em></li>
    </ul>

    <footer>
        <p><small>&copy; 2026 Daksh Pandey. Built using Claude Code.</small></p>
    </footer>

    <script>
        (async () => {
            const res = await fetch("posts.json");
            const posts = await res.json();
            posts.sort((a, b) => b.date.localeCompare(a.date));

            const ul = document.getElementById("post-list");
            ul.innerHTML = "";
            for (const p of posts) {
                const li = document.createElement("li");
                li.innerHTML = `
                    <a class="post-title" href="post.html?post=${encodeURIComponent(p.slug)}">${escapeHtml(p.title)}</a>
                    <div class="post-meta">${formatDate(p.date)}</div>
                    <div>${escapeHtml(p.description || "")}</div>
                    <div class="post-tags">${(p.tags || []).map(t => `<span>#${escapeHtml(t)}</span>`).join("")}</div>
                `;
                ul.appendChild(li);
            }
        })();
    </script>
</body>
</html>
